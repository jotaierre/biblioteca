<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Biblioteca Comunitária</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%23435ff2%22><path d=%22M21 4H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zM3 6h8v12H3V6zm18 12h-8V6h8v12z%22/><path d=%22M5 8h4v2H5zm0 3h4v2H5zm0 3h4v2H5zm10-6h4v2h-4zm0 3h4v2h-4zm0 3h4v2h-4z%22/></svg>">
    <!-- Tailwind CDN para garantir cores e estilos sem depender do build local imediato -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f5f7ff', 100: '#ebf0fe', 200: '#ced9fd', 300: '#a1b6fb',
                            400: '#6d8bf7', 500: '#435ff2', 600: '#2c3ee6', 700: '#232fcc',
                            800: '#2129a6', 900: '#1f2784', 950: '#12164d',
                        },
                    },
                },
            },
        }
    </script>
    <link rel="stylesheet" href="./src/style.css">
</head>
<body class="bg-slate-50 min-h-screen">
    <!-- Navbar -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-30">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-primary-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18 18.246 18.477 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                    </svg>
                    <span class="ml-2 text-xl font-bold text-slate-900 hidden sm:block">Biblioteca Comunitária</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="user-email" class="text-sm text-slate-500 hidden md:block"></span>
                    <button id="btn-logout" class="px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 rounded-lg transition-colors">
                        Sair
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Tabs -->
        <div class="border-b border-slate-200 mb-8">
            <nav class="-mb-px flex space-x-8" aria-label="Tabs">
                <button id="tab-livros" class="border-primary-500 text-primary-600 whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm">
                    Livros
                </button>
                <button id="tab-autores" class="border-transparent text-slate-500 hover:text-slate-700 hover:border-slate-300 whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm">
                    Autores
                </button>
            </nav>
        </div>

        <!-- Section Livros -->
        <section id="section-livros">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold text-slate-900">Gestão de Livros</h1>
                <button onclick="window.openModal('modal-livro')" class="inline-flex items-center px-4 py-2 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-colors">
                    Adicionar Livro
                </button>
            </div>
            
            <div id="livros-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Cards de Livros serão inseridos aqui -->
                <div class="animate-pulse bg-white p-6 rounded-xl border border-slate-200">
                    <div class="h-4 bg-slate-200 rounded w-3/4 mb-4"></div>
                    <div class="h-3 bg-slate-200 rounded w-1/2 mb-2"></div>
                    <div class="h-3 bg-slate-200 rounded w-5/6"></div>
                </div>
            </div>
        </section>

        <!-- Section Autores -->
        <section id="section-autores" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold text-slate-900">Gestão de Autores</h1>
                <button onclick="window.openModal('modal-autor')" class="inline-flex items-center px-4 py-2 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-colors">
                    Adicionar Autor
                </button>
            </div>
            
            <div class="bg-white shadow overflow-hidden sm:rounded-lg border border-slate-200">
                <table class="min-w-full divide-y divide-slate-200">
                    <thead class="bg-slate-50">
                        <tr>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Nome</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Nacionalidade</th>
                            <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-slate-500 uppercase tracking-wider">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="autores-list" class="bg-white divide-y divide-slate-200 text-sm text-slate-900">
                        <!-- Linhas de Autores serão inseridas aqui -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Modal Livro -->
    <div id="modal-livro" class="fixed inset-0 z-50 hidden overflow-y-auto">
        <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 transition-opacity" aria-hidden="true" onclick="window.closeModal('modal-livro')">
                <div class="absolute inset-0 bg-slate-900 opacity-75"></div>
            </div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div class="inline-block align-bottom bg-white rounded-2xl text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
                <form id="form-livro" class="p-6">
                    <input type="hidden" id="livro-id">
                    <h3 id="modal-livro-title" class="text-xl font-bold text-slate-900 mb-6">Adicionar Livro</h3>
                    <div class="space-y-4">
                        <div>
                            <label for="livro-titulo" class="block text-sm font-medium text-slate-700">Título</label>
                            <input type="text" id="livro-titulo" required class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-lg shadow-sm focus:ring-primary-500 focus:border-primary-500 sm:text-sm">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label for="livro-ano" class="block text-sm font-medium text-slate-700">Ano</label>
                                <input type="number" id="livro-ano" class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-lg shadow-sm focus:ring-primary-500 focus:border-primary-500 sm:text-sm">
                            </div>
                            <div>
                                <label for="livro-genero" class="block text-sm font-medium text-slate-700">Gênero</label>
                                <input type="text" id="livro-genero" class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-lg shadow-sm focus:ring-primary-500 focus:border-primary-500 sm:text-sm">
                            </div>
                        </div>
                        <div>
                            <label for="livro-isbn" class="block text-sm font-medium text-slate-700">ISBN</label>
                            <input type="text" id="livro-isbn" class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-lg shadow-sm focus:ring-primary-500 focus:border-primary-500 sm:text-sm">
                        </div>
                        <div>
                            <label for="livro-autor" class="block text-sm font-medium text-slate-700">Autor</label>
                            <select id="livro-autor" required class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-lg shadow-sm focus:ring-primary-500 focus:border-primary-500 sm:text-sm">
                                <option value="">Selecione um autor...</option>
                            </select>
                        </div>
                    </div>
                    <div class="mt-8 flex justify-end space-x-3">
                        <button type="button" onclick="window.closeModal('modal-livro')" class="px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 rounded-lg transition-colors">Cancelar</button>
                        <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-primary-600 hover:bg-primary-700 rounded-lg transition-colors">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal Autor -->
    <div id="modal-autor" class="fixed inset-0 z-50 hidden overflow-y-auto">
        <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 transition-opacity" aria-hidden="true" onclick="window.closeModal('modal-autor')">
                <div class="absolute inset-0 bg-slate-900 opacity-75"></div>
            </div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div class="inline-block align-bottom bg-white rounded-2xl text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
                <form id="form-autor" class="p-6">
                    <input type="hidden" id="autor-id">
                    <h3 id="modal-autor-title" class="text-xl font-bold text-slate-900 mb-6">Adicionar Autor</h3>
                    <div class="space-y-4">
                        <div>
                            <label for="autor-nome" class="block text-sm font-medium text-slate-700">Nome Completo</label>
                            <input type="text" id="autor-nome" required class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-lg shadow-sm focus:ring-primary-500 focus:border-primary-500 sm:text-sm">
                        </div>
                        <div>
                            <label for="autor-nacionalidade" class="block text-sm font-medium text-slate-700">Nacionalidade</label>
                            <input type="text" id="autor-nacionalidade" class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-lg shadow-sm focus:ring-primary-500 focus:border-primary-500 sm:text-sm">
                        </div>
                    </div>
                    <div class="mt-8 flex justify-end space-x-3">
                        <button type="button" onclick="window.closeModal('modal-autor')" class="px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 rounded-lg transition-colors">Cancelar</button>
                        <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-primary-600 hover:bg-primary-700 rounded-lg transition-colors">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="./src/menu.js"></script>
</body>
</html>
